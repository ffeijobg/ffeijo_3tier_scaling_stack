# manifests/frontend/02-deployment.yaml
 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: apps
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
      annotations:
        # Force pod restart when nginx config changes (checksum-based)
        checksum/config: "{{ sha256sum of configmap }}"  # Managed by Helm/kustomize in prod
    spec:
      serviceAccountName: frontend-sa
      terminationGracePeriodSeconds: 30
 
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [frontend]
                topologyKey: kubernetes.io/hostname
 
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            # tmpfs for nginx temp files — no disk I/O for proxy buffers
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          
          # nginx exits gracefully on SIGQUIT; send SIGTERM → SIGQUIT mapping
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 3 && nginx -s quit"]
      
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
