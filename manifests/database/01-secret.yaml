# manifests/database/01-secret.yaml
# In production: use Sealed Secrets, SOPS, or Vault agent injection.
# Never commit plaintext Secrets to git — these are base64, not encrypted.
# For this lab: echo -n "value" | base64
 
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: apps
  labels:
    tier: database
type: Opaque
data:
  POSTGRES_USER:     YXBwdXNlcg==       # appuser
  POSTGRES_PASSWORD: YXBwcGFzc3dvcmQ=   # apppassword
  POSTGRES_DB:       YXBwZGI=           # appdb
