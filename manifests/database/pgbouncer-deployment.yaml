# manifests/database/pgbouncer-deployment.yaml
# PgBouncer sits between backend pods and Postgres.
# As backend HPA scales from 2 → 8 pods, each with a 5-connection pool,
# that's up to 40 connections hitting Postgres. max_connections=100 handles this,
# but PgBouncer lets you safely run 200+ backend connections with pool_size=20 to PG.
 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: apps
  labels:
    app: pgbouncer
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        tier: database
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.2-p0
          ports:
            - containerPort: 5432
          env:
            - name: DB_HOST
              value: postgres-service
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POOL_MODE
              value: transaction       # transaction pooling: best for short-lived queries
            - name: MAX_CLIENT_CONN
              value: "200"
            - name: DEFAULT_POOL_SIZE
              value: "20"
            - name: AUTH_TYPE
              value: scram-sha-256     # matches Postgres 16's default password encryption
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-service
  namespace: apps
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 5432
      targetPort: 5432
