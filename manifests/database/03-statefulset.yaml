# manifests/database/03-statefulset.yaml
#
# WHY STATEFULSET, NOT DEPLOYMENT:
# - Stable pod DNS (postgres-0.postgres-headless.apps.svc.cluster.local)
# - Ordered startup/shutdown (critical for primary-replica promotion)
# - volumeClaimTemplates give each pod its OWN PVC — data survives pod deletion
# - Even for single-instance Postgres, StatefulSet is the right primitive
#   because it models "this pod owns this data" semantics correctly.
 
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: apps
  labels:
    app: postgres
    tier: database
spec:
  serviceName: postgres-headless        # Points to headless service
  replicas: 1                           # Single primary; read replicas = separate StatefulSet
  selector:
    matchLabels:
      app: postgres
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      serviceAccountName: database-sa
      terminationGracePeriodSeconds: 60   # Give Postgres time to checkpoint on SIGTERM
      
      # Postgres requires specific directory permissions — init container handles this
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
 
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          
          args: ["-c", "config_file=/etc/postgresql/postgresql.conf"]
          
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          
          # Liveness: can we accept a query? If not, kubelet restarts the container.
          # Use a TCP check first (faster) then pg_isready for accuracy.
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "appuser", "-d", "appdb"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness: is Postgres accepting connections AND is our schema ready?
          # The backend readiness probe depends on this — if Postgres isn't ready,
          # backends will also become unready, protecting users from 500s.
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U appuser -d appdb && psql -U appuser -d appdb -c 'SELECT 1 FROM items LIMIT 1'"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
 
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
            items:
              - key: postgresql.conf
                path: postgresql.conf
        - name: init-scripts
          configMap:
            name: postgres-config
            items:
              - key: init.sql
                path: init.sql
 
  # VolumeClaimTemplate: creates postgres-data-postgres-0 PVC.
  # This PVC is NOT deleted when the StatefulSet is deleted — you must
  # delete it manually. This is intentional data protection behavior.
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          tier: database
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard          # KinD's default local-path-provisioner
        resources:
          requests:
            storage: 10Gi
