# ansible/inventory/hosts.yml
# For local execution (running on the same machine as KinD), we use localhost.
# For remote execution (CI box, dedicated infra host), replace with real IPs.
 
all:
  hosts:
    infra-host:
      ansible_host: localhost
      ansible_connection: local
  vars:
    kind_version: "0.24.0"
    kubectl_version: "1.34.0"
    helm_version: "3.15.0"
    k6_version: "0.52.0"
    docker_data_root: "/var/lib/docker"
    docker_log_driver: "json-file"
    docker_log_max_size: "100m"
    docker_log_max_file: "3"
