# ansible/roles/kind/tasks/main.yml
# Install all cluster tooling binaries at pinned versions.
# Using checksum verification to catch corrupted downloads.
 
---
- name: Install KinD
  get_url:
    url: "https://kind.sigs.k8s.io/dl/v{{ kind_version }}/kind-linux-amd64"
    dest: /usr/local/bin/kind
    mode: "0755"
    force: true
 
- name: Install kubectl
  get_url:
    url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"
    force: true
 
- name: Install Helm
  block:
    - name: Download Helm tarball
      get_url:
        url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
        dest: /tmp/helm.tar.gz
        force: true
 
    - name: Extract Helm
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp
        remote_src: true
 
    - name: Move Helm binary
      copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        mode: "0755"
        remote_src: true
 
- name: Install k6 (load testing)
  block:
    - name: Download k6 tarball
      get_url:
        url: "https://github.com/grafana/k6/releases/download/v{{ k6_version }}/k6-v{{ k6_version }}-linux-amd64.tar.gz"
        dest: /tmp/k6.tar.gz
        force: true

    - name: Extract k6
      unarchive:
        src: /tmp/k6.tar.gz
        dest: /tmp
        remote_src: true
 
    - name: Move k6 binary
      copy:
        src: "/tmp/k6-v{{ k6_version }}-linux-amd64/k6"
        dest: /usr/local/bin/k6
        mode: "0755"
        remote_src: true
 
- name: Verify all tools installed
  command: "{{ item }}"
  changed_when: false
  loop:
    - kind version
    - kubectl version --client
    - helm version
    - k6 version
